<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITパスポート過去問（令和3年〜令和7年対応）｜各種規定</title>
<style>
  :root{
    --bg:#0F0F0F; --surface:#1A1A1C; --line:#2A2A2E;
    --text:#E8E8EA; --muted:#9A9AA2; --primary:#6366F1; --primary-soft:#8B8DF5;
  }
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",sans-serif;
    line-height:1.8; font-size:16px; letter-spacing:.01em;
    min-height:100vh; display:flex; align-items:center;
  }
  .wrap{max-width:680px; margin:0 auto; padding:56px 22px;}
  .eyebrow{color:var(--primary-soft); font-size:13px; letter-spacing:.14em; text-transform:uppercase; margin:0 0 12px;}
  h1{font-size:26px; line-height:1.45; margin:0 0 10px; font-weight:700;}
  .lead{color:var(--muted); font-size:14.5px; margin:0 0 36px;}
  .links{display:flex; flex-direction:column; gap:14px;}
  a.tile{
    display:flex; align-items:center; justify-content:space-between;
    background:var(--surface); border:1px solid var(--line); border-radius:14px;
    padding:20px 22px; text-decoration:none; color:var(--text);
    transition:border-color .18s ease, transform .18s ease;
  }
  a.tile:hover{border-color:var(--primary); transform:translateY(-1px);}
  a.tile:focus-visible{outline:2px solid var(--primary-soft); outline-offset:2px;}
  .tile .t{font-size:16.5px; font-weight:700;}
  .tile .d{color:var(--muted); font-size:13px; margin-top:3px;}
  .tile .arrow{color:var(--primary-soft); font-size:20px; flex:0 0 auto; margin-left:16px;}
  footer{margin-top:40px; color:var(--muted); font-size:13px;}
  @media (max-width:520px){
    .wrap{padding:40px 18px;}
    h1{font-size:22px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">Chi Studio</p>
  <h1>ITパスポート過去問<br>（令和3年〜令和7年対応）</h1>
  <p class="lead">本アプリに関する各種規定・表記をご案内します。</p>

  <nav class="links">
    <a class="tile" href="./privacy.html">
      <span>
        <span class="t">プライバシーポリシー</span>
        <span class="d">情報の取扱いについて</span>
      </span>
      <span class="arrow" aria-hidden="true">→</span>
    </a>
    <a class="tile" href="./terms.html">
      <span>
        <span class="t">利用規約</span>
        <span class="d">本アプリの利用条件</span>
      </span>
      <span class="arrow" aria-hidden="true">→</span>
    </a>
    <a class="tile" href="./tokushoho.html">
      <span>
        <span class="t">特定商取引法に基づく表記</span>
        <span class="d">販売条件・事業者情報</span>
      </span>
      <span class="arrow" aria-hidden="true">→</span>
    </a>
  </nav>

  <footer>
    <p>お問い合わせ：<a href="mailto:examsupport.jp@gmail.com" style="color:var(--primary-soft);">examsupport.jp@gmail.com</a><br>© 2026 Chi Studio</p>
  </footer>
</div>
</body>
</html>
